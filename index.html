<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Internship Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>📊 Internship Company Tracker</h1>

  <div class="controls">
    <button onclick="fetchData()">🔄 Refresh</button>
    <button onclick="showAvailableOnly()">🟢 Available Only</button>
    <button onclick="sortByRegister()">📈 Sort by Registered</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Company</th>
        <th>Address</th>
        <th>Max Accepted</th>
        <th>Max Register</th>
        <th>Registered</th>
        <th>Accepted</th>
        <th>Files</th>
      </tr>
    </thead>

    <tbody id="table-body">
      <tr>
        <td colspan="7">Loading...</td>
      </tr>
    </tbody>
  </table>

  <div class="footer">
    Auto refresh mỗi 60 giây
  </div>

  <!-- ===== POPUP PREVIEW ===== -->
  <div id="popup" class="popup">
    <div class="popup-content">
      <span class="close" onclick="closePopup()">&times;</span>
      <iframe id="viewer"></iframe>
    </div>
  </div>

  <!-- Script phải nằm cuối -->
  <script src="script.js"></script>

</body>
</html>
